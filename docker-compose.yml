version: '3.8'

services:
  landing-page:
    build: .
    image: ghcr.io/aizenworld69/landing-page:latest
    container_name: landing-page
    restart: always
    ports:
      - "20000:20000"
    environment:
      - DATABASE_DIR=/app/data
    env_file:
      - .env
    volumes:
      # Mount cả thư mục data thay vì từng file riêng lẻ
      # Tránh lỗi Docker tạo thư mục thay vì file khi host chưa có file
      - /opt/landing-page/data:/app/data
