# Redirect toàn bộ HTTP (Port 80) sang HTTPS (Port 443)
server {
    listen 80;
    server_name checkin.aizenworld.com;

    return 301 https://$host$request_uri;
}

# Cấu hình HTTPS (Port 443) với Let's Encrypt SSL & SSL Hardening
server {
    listen 443 ssl http2;
    server_name checkin.aizenworld.com;

    # SSL Certificates Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/checkin.aizenworld.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkin.aizenworld.com/privkey.pem;

    # SSL Hardening Security Policies
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (Strict-Transport-Security) Header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy request sang Next.js App Router (Node.js standalone server ở port 20000)
    location / {
        proxy_pass http://127.0.0.1:20000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Giới hạn kích thước body upload
        client_max_body_size 50M;
    }
}
