name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aizenworld69/landing-page

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/aizenworld69/landing-page:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            # ── BƯỚC 0: Backup DB NGAY ĐẦU TIÊN trước mọi thao tác ──────────────
            # Backup cả 3 file SQLite (WAL mode) để không mất data đang trong transaction
            echo "==> Đang sao lưu database..."
            for ext in "" "-wal" "-shm"; do
              src="/opt/landing-page/registrations.db${ext}"
              dst="/opt/registrations_backup.db${ext}"
              if [ -f "$src" ]; then
                cp "$src" "$dst"
                echo "    Đã backup: $src"
              fi
            done

            # ── BƯỚC 1: Đảm bảo git repo tồn tại ────────────────────────────────
            if [ ! -d "/opt/landing-page/.git" ]; then
              echo "==> Git repo không tìm thấy, đang clone lại..."
              rm -rf /opt/landing-page
              git clone https://github.com/Aizenworld69/landing-page.git /opt/landing-page
            fi

            # ── BƯỚC 2: Cập nhật code mới nhất ──────────────────────────────────
            echo "==> Đang cập nhật code..."
            cd /opt/landing-page
            git reset --hard
            git clean -fd
            git pull origin main

            # ── BƯỚC 3: Khôi phục database từ backup ─────────────────────────────
            echo "==> Đang khôi phục database..."
            for ext in "" "-wal" "-shm"; do
              src="/opt/registrations_backup.db${ext}"
              dst="/opt/landing-page/registrations.db${ext}"
              if [ -f "$src" ]; then
                cp "$src" "$dst"
                echo "    Đã khôi phục: $dst"
              fi
            done

            # Đảm bảo file .db tồn tại (tránh Docker mount nhầm thành thư mục)
            touch /opt/landing-page/registrations.db

            # ── BƯỚC 4: Deploy container mới ─────────────────────────────────────
            echo "==> Đang deploy container..."
            docker logout ghcr.io || true
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "==> Deploy successful!"
