name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aizenworld69/landing-page

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/aizenworld69/landing-page:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            # Tự động clone lại nếu git repo bị mất hoặc chưa tồn tại
            if [ ! -d "/opt/landing-page/.git" ]; then
              echo "Git repo không tìm thấy, đang clone lại..."
              rm -rf /opt/landing-page
              git clone https://github.com/Aizenworld69/landing-page.git /opt/landing-page
            fi

            cd /opt/landing-page
            git reset --hard
            git clean -fd
            git pull origin main

            # Đảm bảo file database tồn tại trước khi mount (tránh Docker tạo nhầm thư mục)
            touch /opt/landing-page/registrations.db

            # Đăng xuất ghcr.io để tránh token cũ/hết hạn trên VPS làm chặn tải public image
            docker logout ghcr.io || true

            # Kéo Docker Image mới và cập nhật Container
            docker compose pull
            docker compose up -d --remove-orphans

            # Dọn dẹp các image cũ để tiết kiệm dung lượng ổ đĩa
            docker image prune -f

            echo "Deploy successful!"
