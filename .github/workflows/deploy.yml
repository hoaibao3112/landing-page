name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Tải cấu hình NVM/Node.js nếu có
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Di chuyển vào thư mục dự án
            cd /opt/landing-page
            
            # Reset các thay đổi cục bộ (nếu có) trên VPS để tránh xung đột git pull
            git reset --hard
            git clean -fd
            
            # Lấy code mới nhất từ nhánh main
            git pull origin main
            
            # Cài đặt dependencies
            npm install
            
            # Build dự án
            EXPERIMENTAL_CPUS=1 npm run build
            
            # Khởi động lại ứng dụng qua PM2
            pm2 reload landing-page || pm2 restart landing-page
