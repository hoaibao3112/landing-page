name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aizenworld69/landing-page

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/aizenworld69/landing-page:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            DATA_DIR="/opt/landing-page/data"
            BACKUP_DIR="/opt/landing-page/backup"

            # ── BƯỚC 0: Checkpoint WAL và dừng container an toàn ────────────────
            echo "==> Đang checkpoint WAL trước khi dừng container..."
            # Chạy checkpoint trong container nếu đang chạy
            docker exec landing-page sh -c \
              "sqlite3 /app/data/registrations.db 'PRAGMA wal_checkpoint(TRUNCATE);'" \
              2>/dev/null || true

            echo "==> Đang dừng container..."
            docker stop landing-page 2>/dev/null || true
            # Đợi container dừng hẳn
            docker wait landing-page 2>/dev/null || true

            # ── BƯỚC 1: Backup toàn bộ thư mục data ─────────────────────────────
            echo "==> Đang sao lưu database..."
            mkdir -p "$BACKUP_DIR"
            if [ -f "$DATA_DIR/registrations.db" ]; then
              # Dùng sqlite3 để tạo backup sạch (merge WAL vào .db chính)
              sqlite3 "$DATA_DIR/registrations.db" \
                ".backup '$BACKUP_DIR/registrations.db'" 2>/dev/null || \
                cp "$DATA_DIR/registrations.db" "$BACKUP_DIR/registrations.db"
              echo "    Đã backup DB vào $BACKUP_DIR"
            else
              echo "    Không có DB cũ, bỏ qua backup"
            fi

            # ── BƯỚC 2: Đảm bảo thư mục data tồn tại ───────────────────────────
            mkdir -p "$DATA_DIR"

            # ── BƯỚC 3: Khôi phục database từ backup ────────────────────────────
            echo "==> Đang khôi phục database..."
            if [ -f "$BACKUP_DIR/registrations.db" ]; then
              cp "$BACKUP_DIR/registrations.db" "$DATA_DIR/registrations.db"
              # Xóa WAL/SHM cũ (đã được merge vào .db bởi sqlite3 .backup)
              rm -f "$DATA_DIR/registrations.db-wal"
              rm -f "$DATA_DIR/registrations.db-shm"
              echo "    Đã khôi phục DB sạch (không có WAL/SHM)"
            else
              # Lần đầu deploy: tạo file DB trống
              if [ ! -f "$DATA_DIR/registrations.db" ]; then
                touch "$DATA_DIR/registrations.db"
                echo "    Tạo mới file DB (lần đầu deploy)"
              fi
            fi

            # ── BƯỚC 4: Pull image mới và khởi động container ───────────────────
            echo "==> Đang pull image mới..."
            # Đảm bảo docker-compose.yml tồn tại trên server
            if [ ! -f "/opt/landing-page/docker-compose.yml" ]; then
              echo "==> Không tìm thấy docker-compose.yml, đang tải về..."
              mkdir -p /opt/landing-page
              curl -fsSL \
                "https://raw.githubusercontent.com/Aizenworld69/landing-page/main/docker-compose.yml" \
                -o /opt/landing-page/docker-compose.yml
            else
              # Cập nhật docker-compose.yml mới nhất
              curl -fsSL \
                "https://raw.githubusercontent.com/Aizenworld69/landing-page/main/docker-compose.yml" \
                -o /opt/landing-page/docker-compose.yml
            fi

            cd /opt/landing-page
            docker logout ghcr.io || true
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "==> Deploy successful!"
